<!DOCTYPE html>
<html lang="en">
<head>
	<base target="_top">
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	
	<title>La Joël Tour 2026</title>
	
	<link rel="shortcut icon" type="image/x-icon" href="docs/images/favicon.ico" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src='//api.tiles.mapbox.com/mapbox.js/plugins/leaflet-omnivore/v0.3.1/leaflet-omnivore.min.js'></script> 
    <script src='https://cdnjs.cloudflare.com/ajax/libs/leaflet.fullscreen/1.4.1/Control.FullScreen.min.js'></script> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.fullscreen/1.4.1/Control.FullScreen.min.css"/>
	<script src="https://unpkg.com/leaflet-providers@latest/leaflet-providers.js"></script>
	<link rel="stylesheet" href="/css/leaflet-distance-marker.css" media="screen" />
	<script src="/js/leaflet-distance-marker.js" type="text/javascript"></script>
	<script src="/js/makemap.js"></script>
	<script src=" https://cdn.jsdelivr.net/npm/leaflet-geometryutil@0.10.3/src/leaflet.geometryutil.min.js">
	</script>
	<style>
		#map { height: 450px; }
	</style>

	
</head>
<body>

<div id="map" style="width: 100%"></div>
<script>
 var map = L.map('map', {fullscreenControl: true});

  var baseMaps = {
  	"CartoDB": L.tileLayer.provider('CartoDB.Positron'),
	"CyclOSM": L.tileLayer.provider('CyclOSM'),
  	"OpenStreetMap": L.tileLayer.provider('OpenStreetMap.Mapnik'),
	"ESRI World Imagery": L.tileLayer.provider('Esri.WorldImagery'),
  };

  L.tileLayer.provider('OpenStreetMap.Mapnik').addTo(map);


  var onEachFeature = function (feature, layer) {
	latlon = [];
	coords = feature.geometry.coordinates;
	for ( var i=0; i < coords.length; ++i ){
		latlon.push(L.latLng(coords[i][1], coords[i][0]));
	}	
  };

  var customLayer = L.geoJson(null, {
  	style: function(feature) {
  		return {
  			color: "red",
  			weight: 3,
  			opacity: .75
  			};
  	},
	onEachFeature: onEachFeature
  });

  line0 = omnivore.gpx("/gpx/Liege2026_45K.gpx", null, customLayer).on('ready', function() {
	line1 = L.polyline(latlon, { color: "red", showAll: 11, offset: 1600, distanceMarkers: true });
	map.addLayer(line1);
	map.fitBounds(line1.getBounds());
  });

 var customLayer2 = L.geoJson(null, {
  	style: function(feature) {
  		return {
  			color: "blue",
  			weight: 3,
  			opacity: .75
  			};
  	},
	onEachFeature: onEachFeature
  });

 var customLayer3 = L.geoJson(null, {
  	style: function(feature) {
  		return {
  			color: "green",
  			weight: 3,
  			opacity: .75
  			};
  	},
	onEachFeature: onEachFeature
  });

  line2 = omnivore.gpx("/gpx/Liege2026_24K.gpx", null, customLayer2).addTo(map);
  line3 = omnivore.gpx("/gpx/Liege2026_15K.gpx", null, customLayer3).addTo(map);

  var overlayMaps = {
	"Trail 45 km": line0,
    "Trail 24 km": line2,
	"Jogging 15 km": line3
	};

  L.control.layers(baseMaps, overlayMaps, {autoZIndex:false, collapsed:false}).addTo(map);
</script>

</body>
</html>
